name: food_delivery
description: A cross-platform food delivery app built with Flutter &amp; Firebase — Google login, dynamic menu, cart, order tracking, in-app notifications, and Stripe payments.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  get: ^4.7.3

  # Backend – Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8

  # Backend – Supabase

  # Backend – Appwrite

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization

  flutter_native_splash: ^2.4.7
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0

  # Payments
  flutter_stripe: ^11.5.0

  # Notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  import_lint: ^0.1.6
  firebase_core_platform_interface: ^7.0.1
  flutter_launcher_icons: ^0.14.3

  # Code Generation

dependency_overrides:

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FAFAFA"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#FAFAFA"
  image: "assets/icons/app_icon.png"
  android_12:
    image: "assets/icons/app_icon.png"
    color: "#FAFAFA"
  android: true
  ios: true

